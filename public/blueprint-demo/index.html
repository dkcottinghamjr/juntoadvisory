<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Junto Advisory — Working Blueprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F4EFE4; --cream-2:#EDE6D6; --paper:#FAF7EF;
    --charcoal:#2B2A26; --ink:#1E3A5F; --ink-soft:#3E5C82;
    --terracotta:#BF5B2D; --ochre:#C2963B; --sage:#6E7F5C;
    --line:#C9BFA8; --line-soft:#DCD3BE;
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:'DM Sans',-apple-system,Helvetica,Arial,sans-serif;
    --mono:'IBM Plex Mono','SF Mono',Menlo,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--cream);
    background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
    background-size:32px 32px;
    color:var(--charcoal);font-family:var(--sans);font-size:16px;line-height:1.55;
  }
  .wrap{max-width:1120px;margin:0 auto;padding:36px 24px 90px}
  .sheet{background:var(--paper);border:1.5px solid var(--charcoal);box-shadow:6px 6px 0 rgba(43,42,38,.12);margin-bottom:32px;position:relative}
  .sheet::before{content:"";position:absolute;inset:8px;border:1px solid var(--line);pointer-events:none}
  .sheet-inner{padding:38px 46px;position:relative;z-index:1}
  h1,h2,h3{font-family:var(--serif);font-weight:600;color:var(--charcoal)}
  .mono{font-family:var(--mono)}
  .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--terracotta);margin-bottom:8px}
  .section-label{display:flex;align-items:center;gap:12px;margin:40px 0 16px}
  .section-label .tag{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--paper);background:var(--charcoal);padding:3px 10px}
  .section-label h2{font-size:25px}
  .section-label .rule{flex:1;border-top:1px solid var(--charcoal)}
  .muted{color:#6d6858}.small{font-size:13px}

  /* nav */
  .navbar{position:sticky;top:0;z-index:60;background:var(--charcoal);color:var(--paper);font-family:var(--mono)}
  .nav-in{max-width:1120px;margin:0 auto;display:flex;gap:4px;align-items:center;padding:0 24px;flex-wrap:wrap}
  .brand{font-size:11px;letter-spacing:.22em;padding:14px 14px 14px 0;color:var(--ochre);white-space:nowrap}
  .tab{background:none;border:none;border-bottom:3px solid transparent;color:#b5ae9c;font-family:var(--mono);font-size:11.5px;letter-spacing:.1em;padding:15px 13px 12px;cursor:pointer}
  .tab:hover{color:var(--paper)}
  .tab.active{color:var(--paper);border-bottom-color:var(--terracotta)}
  .nav-spacer{flex:1}
  .wk-badge{font-size:10.5px;color:var(--cream);border:1px solid #57544c;padding:4px 10px;letter-spacing:.08em}

  /* title block */
  .titleblock{display:grid;grid-template-columns:1fr 300px;border-bottom:1.5px solid var(--charcoal)}
  .titleblock-main{padding:42px 46px}
  .titleblock-main .firm{font-family:var(--mono);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink)}
  .titleblock-main h1{font-size:44px;line-height:1.08;margin:14px 0 10px}
  .titleblock-main .sub{font-size:17px;color:#57544c;max-width:54ch}
  .titleblock-meta{border-left:1.5px solid var(--charcoal);display:flex;flex-direction:column}
  .titleblock-meta div{padding:9px 18px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:12px}
  .titleblock-meta div:last-child{border-bottom:none}
  .titleblock-meta .k{color:#8a8471;letter-spacing:.12em;text-transform:uppercase;font-size:10px;display:block}

  /* story */
  .dynamic{display:grid;grid-template-columns:1.4fr 1fr;gap:34px;align-items:start}
  .dynamic h3{font-size:29px;font-style:italic;color:var(--ink);margin-bottom:12px}
  .dynamic p{font-size:16.5px;margin-bottom:12px}
  blockquote{font-family:var(--serif);font-style:italic;font-size:21px;line-height:1.45;border-left:3px solid var(--ochre);padding:6px 0 6px 20px;margin-top:8px}
  blockquote cite{display:block;font-family:var(--mono);font-style:normal;font-size:11px;letter-spacing:.14em;color:#8a8471;margin-top:10px;text-transform:uppercase}
  .contrast{display:grid;grid-template-columns:1fr auto 1fr;border:1.5px solid var(--charcoal);background:var(--paper)}
  .contrast .cell{padding:26px 30px;text-align:center}
  .contrast .vs{display:flex;align-items:center;font-family:var(--mono);color:var(--terracotta);padding:0 6px;border-left:1px dashed var(--line);border-right:1px dashed var(--line);font-size:13px}
  .contrast .num{font-family:var(--serif);font-size:42px;font-weight:600;line-height:1}
  .contrast .cell:first-child .num{color:var(--terracotta)}
  .contrast .cell:last-child .num{color:var(--ink)}
  .contrast .lbl{font-family:var(--mono);font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:#6d6858;margin-top:10px}
  .contrast-note{font-size:13.5px;color:#6d6858;margin-top:10px;font-style:italic}
  .journey{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1.5px solid var(--charcoal)}
  .j-col{padding:24px 28px}
  .j-col:first-child{border-right:1.5px solid var(--charcoal);background:var(--cream-2)}
  .j-col h3{font-size:22px;margin-bottom:14px}
  .j-col:first-child h3{color:#6d6858}
  .j-col:last-child h3{color:var(--ink)}
  .j-moment{padding:10px 0 10px 24px;border-bottom:1px dashed var(--line);position:relative;font-size:14.5px}
  .j-moment:last-child{border-bottom:none}
  .j-col:first-child .j-moment::before{content:"✕";position:absolute;left:0;color:var(--terracotta);font-size:12px;top:13px}
  .j-col:last-child .j-moment::before{content:"→";position:absolute;left:0;color:var(--sage);font-size:12px;top:13px}
  .j-note{font-size:13.5px;font-style:italic;color:#6d6858;margin-top:10px}

  /* map */
  .mapbox{border:1.5px solid var(--charcoal);background:var(--paper);padding:10px 6px 2px;overflow-x:auto}
  .maphint{font-family:var(--mono);font-size:11px;color:#8a8471;margin:8px 2px 0}
  .node{cursor:pointer}
  .node rect{fill:var(--paper);stroke:var(--charcoal);stroke-width:1.5}
  .node:hover rect{fill:var(--cream-2)}
  .node text{font-family:var(--sans);font-size:12.5px;fill:var(--charcoal)}
  .node .n-num{font-family:var(--mono);font-size:10px;fill:var(--terracotta)}
  .edge{fill:none;stroke:var(--ink-soft);stroke-width:1.3;marker-end:url(#arrow)}
  .edge-lbl{font-family:var(--mono);font-size:9.5px;fill:var(--ink-soft)}
  .phase-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.14em;fill:#8a8471}
  .phase-line{stroke:var(--line);stroke-dasharray:4 5}

  /* chips */
  .chip{font-family:var(--mono);font-size:11px;letter-spacing:.08em;padding:3px 9px;border:1.2px solid;display:inline-block;text-transform:uppercase}
  .v-CHAMPION{color:#5c4a12;border-color:var(--ochre);background:rgba(194,150,59,.14)}
  .v-ADOPT{color:var(--ink);border-color:var(--ink);background:rgba(30,58,95,.08)}
  .v-CONDITIONS{color:#7a5b16;border-color:#b28a2e;background:rgba(194,150,59,.08)}
  .v-DEFER{color:#57544c;border-color:#8a8471;background:rgba(138,132,113,.10)}
  .v-REJECT{color:var(--terracotta);border-color:var(--terracotta);background:rgba(191,91,45,.10)}
  .sig{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border:1.3px solid var(--charcoal)}
  .sig-strong{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .sig-rec{background:rgba(30,58,95,.09);color:var(--ink)}
  .sig-cond{background:rgba(194,150,59,.12);color:#7a5b16}
  .agree{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;display:inline-block}
  .agree-consensus{background:rgba(110,127,92,.15);color:#44543a;border:1.2px solid var(--sage)}
  .agree-split{background:rgba(194,150,59,.15);color:#7a5b16;border:1.2px solid var(--ochre)}
  .agree-conflict{background:rgba(191,91,45,.14);color:var(--terracotta);border:1.2px solid var(--terracotta)}
  .tag-verified{color:#44543a;border-color:var(--sage);background:rgba(110,127,92,.12)}
  .tag-estimated,.tag-unverified{color:#7a5b16;border-color:#b28a2e;background:rgba(194,150,59,.10)}
  .st-met{color:#44543a;border-color:var(--sage);background:rgba(110,127,92,.12)}
  .st-moving{color:#7a5b16;border-color:var(--ochre);background:rgba(194,150,59,.12)}
  .st-watch{color:var(--terracotta);border-color:var(--terracotta);background:rgba(191,91,45,.10)}
  .st-await{color:#57544c;border-color:#8a8471;background:rgba(138,132,113,.08)}

  /* plan index + detail (blueprint DNA) */
  table.index{width:100%;border-collapse:collapse;border:1.5px solid var(--charcoal)}
  table.index th{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;text-align:left;padding:10px 14px;background:var(--charcoal);color:var(--paper);font-weight:500}
  table.index td{padding:14px;border-bottom:1px solid var(--line);vertical-align:middle}
  table.index tr:last-child td{border-bottom:none}
  table.index tr.rowlink{cursor:pointer}
  table.index tr.rowlink:hover td{background:var(--cream-2)}
  .idx-num{font-family:var(--mono);color:var(--terracotta);font-size:13px}
  .idx-title{font-family:var(--serif);font-size:19px;font-weight:600}
  .verdict-mini{display:inline-block;width:12px;height:12px;border:1px solid var(--charcoal);margin-right:4px;vertical-align:middle}
  .progress-track{background:var(--cream-2);border:1px solid var(--line);height:10px;width:110px;position:relative;display:inline-block;vertical-align:middle}
  .progress-fill{position:absolute;top:0;left:0;bottom:0;background:var(--sage)}
  .pct{font-family:var(--mono);font-size:11px;color:#6d6858;margin-left:8px}
  .sheet-head{display:flex;gap:26px;align-items:flex-start;border-bottom:1.5px solid var(--charcoal);padding-bottom:22px;margin-bottom:26px}
  .big-num{font-family:var(--mono);font-size:52px;color:var(--terracotta);line-height:1;padding-top:4px}
  .sheet-head h1{font-size:34px;line-height:1.1;margin:2px 0 10px}
  .headtags{display:flex;gap:10px;flex-wrap:wrap}
  .why{background:var(--cream-2);border-left:3px solid var(--terracotta);padding:14px 18px;margin-top:16px;font-size:15.5px}
  .why b{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--terracotta);display:block;margin-bottom:5px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));border:1.5px solid var(--charcoal)}
  .stat{padding:18px 20px;border-right:1px solid var(--line)}
  .stat:last-child{border-right:none}
  .stat .val{font-family:var(--serif);font-size:28px;font-weight:600;color:var(--ink)}
  .stat .lb{font-size:12.5px;color:#6d6858;margin:4px 0 8px}
  .costline{display:flex;flex-wrap:wrap;gap:26px;font-family:var(--mono);font-size:12.5px;padding:12px 2px;color:#57544c}
  .costline b{color:var(--charcoal)}
  .panel{display:grid;grid-template-columns:repeat(3,1fr);border:1.5px solid var(--charcoal)}
  .persp{padding:20px;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:10px}
  .persp:last-child{border-right:none}
  .persp .p-title{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#6d6858}
  .persp .p-name{font-family:var(--serif);font-size:22px;font-weight:600}
  .persp .p-axis{font-size:12px;color:#8a8471;font-style:italic;margin-top:-6px}
  .persp .p-score{font-family:var(--mono);font-size:12px;color:var(--ink)}
  .persp .p-reason{font-size:14px}
  .resolution{border:1.5px solid var(--charcoal);border-top:none;padding:20px 24px;background:var(--cream-2)}
  .resolution .r-head{display:flex;gap:12px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .resolution .crux{font-size:15px;margin-bottom:10px}
  .resolution .crux b,.resolution .call b{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);display:block;margin-bottom:4px}
  .resolution .call{font-size:15px}
  .gatecard{border:1.5px solid var(--ochre);background:rgba(194,150,59,.07);padding:16px 20px;margin-top:14px}
  .gatecard .g-title{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#7a5b16;margin-bottom:6px}
  .gatecard .g-crit{font-size:15px;font-weight:500}
  .gatecard .g-branch{font-size:13.5px;color:#6d6858;margin-top:6px}
  .steps{border:1.5px solid var(--charcoal)}
  .step{display:flex;gap:14px;padding:14px 18px;border-bottom:1px solid var(--line);align-items:flex-start}
  .step:last-child{border-bottom:none}
  .step input[type=checkbox]{appearance:none;width:19px;height:19px;border:1.5px solid var(--charcoal);background:var(--paper);cursor:pointer;flex-shrink:0;margin-top:2px;position:relative}
  .step input[type=checkbox]:checked{background:var(--sage);border-color:var(--sage)}
  .step input[type=checkbox]:checked::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--paper);font-size:13px}
  .step.done .s-text{text-decoration:line-through;color:#8a8471}
  .step .s-text{font-size:15px;font-weight:500;cursor:pointer}
  .step .s-meta{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--terracotta);margin-top:3px;text-transform:uppercase}
  .step .s-detail{font-size:13.5px;color:#6d6858;margin-top:3px}
  .step .s-done{font-size:12.5px;color:#44543a;margin-top:4px;font-style:italic}
  .step .s-done b{font-family:var(--mono);font-size:10px;font-style:normal;letter-spacing:.1em;color:var(--sage)}
  .howto-btn{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;border:1.2px solid var(--ink);color:var(--ink);background:rgba(30,58,95,.05);padding:4px 10px;cursor:pointer;margin-top:8px}
  .howto-btn:hover{background:var(--ink);color:var(--paper)}
  .howto{border:1.2px solid var(--ink);background:rgba(30,58,95,.04);margin-top:10px;padding:16px 18px}
  .howto .h-sec{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);margin:12px 0 6px}
  .howto .h-sec:first-child{margin-top:0}
  .howto ol{margin-left:20px}
  .howto ol li{font-size:14px;padding:4px 0}
  .howto ul.snags{list-style:none;margin:0}
  .howto ul.snags li{font-size:13.5px;padding:6px 0;border-bottom:1px dashed var(--line)}
  .howto ul.snags li:last-child{border-bottom:none}
  .howto ul.snags b{color:var(--terracotta)}
  .howto .h-meta{font-family:var(--mono);font-size:11px;color:#6d6858;margin-top:4px}
  .howto .h-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)}
  .copied{color:#44543a;font-family:var(--mono);font-size:11px;align-self:center}
  .guide-mark{font-family:var(--mono);font-size:9.5px;color:var(--ink);border:1px solid var(--ink-soft);padding:1px 6px;margin-left:8px;letter-spacing:.08em}
  .steps-progress{display:flex;align-items:center;gap:12px;padding:12px 18px;background:var(--charcoal);color:var(--paper);font-family:var(--mono);font-size:12px}
  .steps-progress .progress-track{width:200px;background:#4a4942;border-color:#4a4942}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .metric-col{border:1.5px solid var(--charcoal)}
  .metric-col .m-head{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:9px 16px;background:var(--charcoal);color:var(--paper)}
  .metric{padding:13px 16px;border-bottom:1px solid var(--line);font-size:14px}
  .metric:last-child{border-bottom:none}
  .metric .m-kpi{font-weight:700}
  .metric .m-sub{color:#6d6858;font-size:13px;margin-top:2px}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  ul.plain{list-style:none}
  ul.plain li{padding:9px 0 9px 22px;border-bottom:1px dashed var(--line);position:relative;font-size:14.5px}
  ul.plain li::before{content:"—";position:absolute;left:0;color:var(--terracotta)}
  ul.plain li:last-child{border-bottom:none}
  .dep-chip{cursor:pointer;text-decoration:underline;text-decoration-color:var(--ochre);text-underline-offset:3px}
  .toolrow{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:9px 0;border-bottom:1px dashed var(--line);font-size:14.5px}
  .toolrow:last-child{border-bottom:none}
  .navbtn{background:none;border:1px solid var(--charcoal);color:var(--charcoal);font-family:var(--mono);font-size:11.5px;padding:6px 13px;cursor:pointer;letter-spacing:.06em}
  .navbtn:hover{background:var(--charcoal);color:var(--paper)}
  .btn-solid{background:var(--terracotta);border-color:var(--terracotta);color:var(--paper)}
  .btn-solid:hover{background:var(--charcoal);border-color:var(--charcoal)}

  /* people */
  .person-card{border:1.5px solid var(--charcoal);margin-bottom:22px;background:var(--paper)}
  .person-head{display:flex;align-items:baseline;gap:14px;padding:16px 20px;background:var(--cream-2);border-bottom:1.5px solid var(--charcoal);flex-wrap:wrap}
  .person-head h3{font-size:23px}
  .person-head .role{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#6d6858}
  .loadwarn{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;padding:3px 9px;border:1.2px solid var(--terracotta);color:var(--terracotta);background:rgba(191,91,45,.08)}
  .loadok{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;padding:3px 9px;border:1.2px solid var(--sage);color:#44543a;background:rgba(110,127,92,.08)}
  .p-step{display:flex;gap:12px;align-items:flex-start;padding:11px 20px;border-bottom:1px dashed var(--line);font-size:14.5px}
  .p-step:last-child{border-bottom:none}
  .p-step .w{font-family:var(--mono);font-size:11px;color:var(--terracotta);white-space:nowrap;min-width:120px;padding-top:2px}
  .p-step .sheetref{font-family:var(--mono);font-size:10.5px;color:var(--ink);cursor:pointer;text-decoration:underline;text-underline-offset:2px;white-space:nowrap;padding-top:3px}
  .p-step input[type=checkbox]{appearance:none;width:16px;height:16px;border:1.5px solid var(--charcoal);cursor:pointer;flex-shrink:0;margin-top:3px;position:relative;background:var(--paper)}
  .p-step input[type=checkbox]:checked{background:var(--sage);border-color:var(--sage)}
  .p-step input[type=checkbox]:checked::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--paper);font-size:11px}
  .p-step.done .txt{text-decoration:line-through;color:#8a8471}

  /* timeline */
  .tl-box{border:1.5px solid var(--charcoal);background:var(--paper);overflow-x:auto;padding:6px}
  .tl-lbl{font-family:var(--sans);font-size:11.5px;fill:var(--charcoal)}
  .tl-rec{font-family:var(--mono);font-size:11px;fill:var(--ink);font-weight:600;letter-spacing:.06em}
  .tl-week{font-family:var(--mono);font-size:9px;fill:#8a8471}
  .tl-grid{stroke:var(--line-soft);stroke-width:1}
  .tl-today{stroke:var(--terracotta);stroke-width:1.6}
  .tl-todaylbl{font-family:var(--mono);font-size:9.5px;fill:var(--terracotta);letter-spacing:.1em}
  .tl-phase{fill:rgba(30,58,95,.045)}
  .tl-phaselbl{font-family:var(--mono);font-size:9.5px;fill:#8a8471;letter-spacing:.14em}

  /* scoreboard */
  table.score{width:100%;border-collapse:collapse;border:1.5px solid var(--charcoal)}
  table.score th{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;text-align:left;padding:10px 14px;background:var(--charcoal);color:var(--paper);font-weight:500}
  table.score td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:14.5px;vertical-align:middle}

  });

function personSteps(pid){
  const out=[];
  D.recommendations.forEach(r=>r.steps.forEach(s=>{
    if((s.ownerIds||[]).includes(pid))out.push({rec:r,step:s});
  }));
  out.sort((a,b)=>(a.step.window.start||99)-(b.step.window.start||99));
  return out;
}
function heaviestLoad(pid){
  let max=0,maxW=0;
  for(let w=1;w<=horizon;w++){
    let n=0;
    personSteps(pid).forEach(({rec,step})=>{
      if(step.window.projected)return;
      if(isDone(rec.id,step.id))return;
      const s=step.window.start,e=step.window.end==null?horizon:step.window.end;
      if(s<=w&&w<=e)n++;
    });
    if(n>max){max=n;maxW=w;}
  }
  return {max,week:maxW};
}

/* ---------- SCOREBOARD ---------- */
function metricStatus(m){
  const rec=S.metrics[m.id];
  if(!rec||rec.actual==null||rec.actual==='')return ['AWAITING DATA','st-await'];
  const a=parseFloat(rec.actual);
  if(isNaN(a))return ['AWAITING DATA','st-await'];
  if(m.direction==='down'){
    if(a<=m.target)return ['TARGET MET','st-met'];
    if(a<m.baseline)return ['MOVING','st-moving'];
    return ['WATCH','st-watch'];
  }else{
    if(a>=m.target)return ['TARGET MET','st-met'];
    if(a>m.baseline)return ['MOVING','st-moving'];
    return ['WATCH','st-watch'];
  }
}

  let h='<div class="sheet"><div class="sheet-inner">';

  }));

    const en=s.window.end==null?horizon:s.window.end;

  const out=[];let awaiting=0;
  D.recommendations.forEach(r=>r.metrics.objective.forEach(m=>{
    const [lbl,cls]=metricStatus(m);
    if(lbl==='AWAITING DATA'){const ph=D.phases.find(p=>p.id===r.phase);if(ph&&ph.startWeek<=CW)awaiting++;return;}
    out.push({rec:r,m,lbl,cls,actual:(S.metrics[m.id]||{}).actual});
  }));
  const rank={'WATCH':0,'MOVING':1,'TARGET MET':2};
  out.sort((a,b)=>rank[a.lbl]-rank[b.lbl]);
  return {items:out.slice(0,6),awaiting};
}
function weeklyFocus(stall,gd,due){
  if(gd.length)return {txt:'A gate is decidable: '+gd[0].title+' — bring the number, make the call.',view:'checkin'};
  if(stall.length)return {txt:'Unblock first: "'+trunc(stall[0].step.text,58)+'" is past its window ('+stall[0].step.ownerLabel+').',view:'plan',sheet:stall[0].rec.id};
  if(due.length)return {txt:'This week\'s work: "'+trunc(due[0].step.text,58)+'" ('+due[0].step.ownerLabel+').',view:'plan',sheet:due[0].rec.id};
  return {txt:'Nothing due, nothing stalled, no gates waiting. Rare air — enjoy it.',view:'plan'};
}
function todoRow(rec,step,late){
  const ck=isDone(rec.id,step.id);
  let h='<div class="todo-row'+(late?' late':'')+'"><input type="checkbox" '+(ck?'checked':'')+' onchange="toggleStep(\''+rec.id+'\',\''+step.id+'\')">';
  h+='<div style="flex:1"><span'+(ck?' style="text-decoration:line-through;color:#8a8471"':'')+'>'+esc(step.text)+'</span>';
  if(late)h+=' <span class="t-flag">PAST WINDOW</span>';
  h+='<span class="t-meta">'+esc(step.ownerLabel)+' · '+esc(step.window.label)+' · <span class="ref" style="cursor:pointer;text-decoration:underline" onclick="goSheet(\''+rec.id+'\')">Sheet '+esc(rec.num)+'</span></span>';
  h+='</div></div>';
  return h;
}
function renderDash(){
  const stall=stalledSteps(),due=dueNow(),next=upNext(),gd=gatesDue();
  const heads=scoreHeadlines(),focus=weeklyFocus(stall,gd,due);
  const pct=totalSteps()?Math.round(100*totalDone()/totalSteps()):0;
  let h='<div class="sheet"><div class="sheet-inner">';
  h+='<div class="kicker">Dashboard</div><h1 style="font-size:36px;margin-bottom:18px">'+esc(D.meta.client)+' — at a glance</h1>';
  h+='<div class="dash-banner"><span class="b-week">WEEK '+CW+'</span>';
  h+='<span class="b-focus" style="cursor:pointer" onclick="'+(focus.sheet?'goSheet(\''+focus.sheet+'\')':'go(\''+focus.view+'\')')+'">'+esc(focus.txt)+'</span>';
  h+='<span class="b-prog">PLAN '+pct+'%<span class="progress-track"><span class="progress-fill" style="width:'+pct+'%"></span></span></span></div>';
  h+='<div class="dash-grid">';
  /* NOW */
  h+='<div class="ck-card"><div class="ck-head">Now — in window or overdue ('+(due.length+stall.length)+')</div><div class="ck-body">';
  if(!due.length&&!stall.length)h+='<div class="muted small">Nothing due this week.</div>';
  stall.forEach(({rec,step})=>h+=todoRow(rec,step,true));
  due.forEach(({rec,step})=>h+=todoRow(rec,step,false));
  h+='</div></div>';
  /* NEXT + gates */
  h+='<div class="ck-card"><div class="ck-head">Up next — starting within 3 weeks ('+next.length+')</div><div class="ck-body">';
  if(!next.length)h+='<div class="muted small">Nothing new starts in the next three weeks.</div>';
  next.forEach(({rec,step})=>h+=todoRow(rec,step,false));
  if(gd.length){h+='<div class="kicker" style="margin-top:14px">Gate decisions waiting</div>';
    gd.forEach(g=>{h+='<div class="todo-row"><span style="color:var(--ochre);font-size:15px">⛩</span><div style="flex:1">'+esc(g.title)+'<span class="t-meta">'+esc(g.criterion)+' · <span class="ref" style="cursor:pointer;text-decoration:underline" onclick="go(\'checkin\')">decide in Check-in</span></span></div></div>';});}
  h+='</div></div>';
  /* PEOPLE PULSE */
  h+='<div class="ck-card dash-full"><div class="ck-head">People pulse</div><div class="ck-body"><table class="pulse">';
  (D.people||[]).forEach(p=>{
    const items=personSteps(p.id);if(!items.length)return;
    const done=items.filter(({rec,step})=>isDone(rec.id,step.id)).length;
    const mine=items.filter(({rec,step})=>{if(step.window.projected||isDone(rec.id,step.id))return false;const en=step.window.end==null?horizon:step.window.end;return step.window.start<=CW&&CW<=en;}).length;
    const late=items.filter(({rec,step})=>!step.window.projected&&!isDone(rec.id,step.id)&&step.window.end!=null&&step.window.end<CW).length;
    const ppct=Math.round(100*done/items.length),load=heaviestLoad(p.id);
    h+='<tr><td style="width:24%"><span class="p-name">'+esc(p.name)+'</span><span class="p-role">'+esc(p.role)+'</span></td>';
    h+='<td style="width:28%"><span class="progress-track" style="width:130px"><span class="progress-fill" style="width:'+ppct+'%"></span></span><span class="pct">'+done+'/'+items.length+'</span></td>';
    h+='<td class="mono" style="font-size:11.5px">'+(mine?mine+' due now':'—')+(late?' · <span style="color:var(--terracotta)">'+late+' late</span>':'')+'</td>';
    h+='<td style="text-align:right">'+(load.max>2?'<span class="loadwarn">⚠ '+load.max+' CONCURRENT · WK '+load.week+'</span>':'<span class="loadok">LOAD OK</span>')+'</td></tr>';
  });
  h+='</table><div class="small muted" style="margin-top:8px;cursor:pointer;text-decoration:underline" onclick="go(\'people\')">Full punch lists →</div></div></div>';
  /* SCOREBOARD HEADLINES */
  h+='<div class="ck-card"><div class="ck-head">Scoreboard headlines</div><div class="ck-body">';
  if(!heads.items.length)h+='<div class="muted small">No actuals entered yet'+(heads.awaiting?' — '+heads.awaiting+' metric'+(heads.awaiting===1?'':'s')+' ready for data':'')+'.</div>';
  heads.items.forEach(x=>{
    h+='<div class="headline-chip"><span><b>'+esc(x.m.kpi)+'</b> <span class="mono" style="font-size:10px;color:#8a8471">S'+esc(x.rec.num)+'</span></span>';
    h+='<span class="h-nums">'+esc(x.m.baseline)+' → <b>'+esc(x.actual)+'</b> / '+esc(x.m.target)+' '+esc(x.m.unit||'')+'</span><span class="chip '+x.cls+'">'+x.lbl+'</span></div>';
  });
  if(heads.items.length&&heads.awaiting)h+='<div class="small muted" style="margin-top:8px">'+heads.awaiting+' more metric'+(heads.awaiting===1?'':'s')+' awaiting data.</div>';
  h+='<div class="small muted" style="margin-top:8px;cursor:pointer;text-decoration:underline" onclick="go(\'score\')">Full scoreboard →</div></div></div>';
  /* PHASES */
  h+='<div class="ck-card"><div class="ck-head">Phases</div><div class="ck-body">';
  D.phases.forEach(p=>{
    const rs=D.recommendations.filter(r=>r.phase===p.id);
    const t=rs.reduce((a,r)=>a+r.steps.length,0),d=rs.reduce((a,r)=>a+r.steps.filter(s=>isDone(r.id,s.id)).length,0);
    const ppct=t?Math.round(100*d/t):0;
    const state=p.endWeek<CW?'ELAPSED':p.startWeek<=CW?'ACTIVE':'AHEAD';
    h+='<div class="ck-item"><span class="mono small">'+esc(p.name)+' · '+state+'</span> <span class="progress-track" style="width:150px;margin-left:10px"><span class="progress-fill" style="width:'+ppct+'%"></span></span><span class="pct">'+ppct+'%</span><div class="small muted">'+esc(p.theme||'')+'</div></div>';
  });
  h+='<div class="small muted" style="margin-top:8px;cursor:pointer;text-decoration:underline" onclick="go(\'timeline\')">Full timeline →</div></div></div>';
  h+='</div>';
  h+='<div class="foot">Everything above is computed from the plan plus your checkboxes, gate calls, and scoreboard entries — nothing is typed into this page. Save a progress file from Check-in before your session with Junto.</div>';
  h+='</div></div>';
  return h;
}

/* ---------- router + actions ---------- */
function render(){
  renderNav();
  root.innerHTML = curView==='dash'?renderDash()
    : curView==='story'?renderStory()
    : curView==='plan'?(curSheet?renderSheet(curSheet):renderPlan())
    : curView==='people'?renderPeople()
    : curView==='timeline'?renderTimeline()
    : curView==='score'?renderScore()
    : renderCheckin();
}
window.go=function(v){curView=v;if(v!=='plan')curSheet=null;else curSheet=null;render();window.scrollTo({top:0});};
window.goSheet=function(id){curView='plan';curSheet=id;render();window.scrollTo({top:0});};
window.toggleStep=function(rid,sid){
  const k=stepKey(rid,sid);
  if(S.steps[k]&&S.steps[k].done)delete S.steps[k];else S.steps[k]={done:true,at:Date.now()};
  save();render();
};
window.setGate=function(gid,st){S.gates[gid]={status:st,at:Date.now()};save();render();};
window.setMetric=function(mid,val){S.metrics[mid]={actual:val===''?null:parseFloat(val),at:Date.now()};save();render();};
window.setNote=function(rid,val){S.notes[rid]=val;save();};
window.exportState=function(){
  S.lastExport=Date.now();save();
  const payload={slug:D.meta.slug,client:D.meta.client,exportedAt:new Date().toISOString(),state:S};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='junto-progress-'+(D.meta.slug||'client')+'-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);render();
};
window.importState=function(input){
  const f=input.files&&input.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{try{
    const p=JSON.parse(rd.result);
    if(p.slug&&p.slug!==D.meta.slug&&!confirm('This progress file is for "'+p.slug+'" — load anyway?'))return;
    S=Object.assign({steps:{},gates:{},metrics:{},notes:{},lastExport:null},p.state||{});
    save();render();
  }catch(e){alert('Could not read that file.');}};
  rd.readAsText(f);
  input.value='';
};
window.printPerson=function(pid){
  curView='people';render();
  document.body.classList.add('print-person');
  const card=document.getElementById('pc-'+pid);
  if(card)card.classList.add('print-target');
  const clean=()=>{document.body.classList.remove('print-person');if(card)card.classList.remove('print-target');window.removeEventListener('afterprint',clean);};
  window.addEventListener('afterprint',clean);
  window.print();
  setTimeout(clean,2000);
};
document.addEventListener('keydown',(ev)=>{
  if(ev.target&&(ev.target.tagName==='TEXTAREA'||ev.target.tagName==='INPUT'))return;
  if(ev.key==='Escape'){window.go('dash');}
  if(curView==='plan'&&curSheet){
    const i=recOrder.indexOf(curSheet);
    if(ev.key==='ArrowRight'&&i<recOrder.length-1)window.goSheet(recOrder[i+1]);
    if(ev.key==='ArrowLeft'&&i>0)window.goSheet(recOrder[i-1]);
  }
});
/* first-ever open lands on the Story (delivery is a narrative moment);
   every later open lands on the Dashboard (operating mode) */
if(S.visited){curView='dash';}else{curView='story';S.visited=true;save();}
render();
})();
</script>
